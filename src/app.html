<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#0a0a0b" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="WW3Watch" />
		<!-- Warm the Supabase connection (TLS + DNS) before the client load() fires
		     its first REST query — the whole feed comes from this origin. crossorigin
		     because the API calls are CORS with an apikey header. Hardcoded like the
		     canonical/OG URLs below; the project ref is fixed for this deploy. -->
		<link rel="preconnect" href="https://qusjbpknlduuklnfciws.supabase.co" crossorigin />
		<link rel="dns-prefetch" href="https://qusjbpknlduuklnfciws.supabase.co" />
		<!-- %sveltekit.assets% carries the GitHub Pages base path; a literal "/" href
		     404'd in production and silently killed the PWA install prompt. -->
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />

		<title>WW3Watch — Real-time global conflict tracker</title>
		<meta name="description" content="Real-time news aggregator for global conflict: 200+ sources across every major region, story clustering across languages, and LLM-curated trending stories as they break." />
		<link rel="canonical" href="https://noahsabaj.github.io/ww3watch/" />
		<!-- Social cards: scrapers don't resolve relative URLs, so these are absolute. -->
		<meta property="og:title" content="WW3Watch — Real-time global conflict tracker" />
		<meta property="og:description" content="Real-time news aggregator for global conflict: 200+ sources across every major region, story clustering across languages, and trending stories as they break." />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://noahsabaj.github.io/ww3watch/" />
		<meta property="og:image" content="https://noahsabaj.github.io/ww3watch/og.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta name="twitter:card" content="summary_large_image" />
		%sveltekit.head%
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon-180x180.png" />
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
