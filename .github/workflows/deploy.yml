name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # The weekly sources-roster backup commits data/sources-backup.json; that's
    # not a site change, so don't rebuild/redeploy (and churn the service worker)
    # for it.
    paths-ignore:
      - 'data/**'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /ww3watch
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
      - name: SPA root + disable Jekyll
        # adapter-static (SPA mode) emits only 404.html; copy it to index.html so
        # the site root returns 200. .nojekyll keeps GitHub Pages from hiding _app/.
        run: |
          cp build/404.html build/index.html
          touch build/.nojekyll
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
