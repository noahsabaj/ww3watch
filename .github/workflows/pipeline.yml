name: Ingestion pipeline

# Fetches RSS feeds, classifies + clusters, and writes to Supabase.
# Replaces the old Vercel cron + cron-job.org trigger. Runs on a Node runner so
# rss-parser and the rest of the npm pipeline work natively (no edge runtime).
on:
  schedule:
    - cron: '*/15 * * * *' # every 15 min (GitHub's min is 5; runs are best-effort)
  workflow_dispatch: {} # manual "Run workflow" button

concurrency:
  group: ww3watch-pipeline
  cancel-in-progress: false # never interrupt an in-flight ingestion run

# contents: checkout; issues: file/append the pipeline-failure alert; actions:
# re-arm scheduled workflows against GitHub's 60-day inactivity auto-disable.
permissions:
  contents: read
  issues: write
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # classify is rate-limited (LLM_MAX_RPM); leave headroom
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Embedding model cache. Restore/save are split on purpose: the save step
      # is gated on the sentinel embeddings.ts writes only after a successful
      # init + smoke embed — a partial download must never poison the immutable
      # key (that would mean re-downloading from HF ~96×/day, or worse, a
      # truncated ONNX failing clustering on every run).
      - id: model-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/ww3watch-transformers
          key: me5b-q8-1ec9243

      - run: npm run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          # Groq free tier is ~6K tokens/min — keep call starts sparse so heavy
          # runs don't live in 429 backoff (which leaks junk through the keyword path).
          LLM_MAX_RPM: '2'
          # Optional: route WAF-blocked feeds through the Cloudflare proxy.
          FEED_PROXY_URL: ${{ secrets.FEED_PROXY_URL }}
          FEED_PROXY_SECRET: ${{ secrets.FEED_PROXY_SECRET }}
          # Optional: authenticated HF downloads at model-cache miss (shared
          # runner IPs risk anonymous 429s), and an emergency threshold knob.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          EMBED_SIM_THRESHOLD: ${{ vars.EMBED_SIM_THRESHOLD }}

      - id: model-ok
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          if ls ~/.cache/ww3watch-transformers/.ok-* >/dev/null 2>&1; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.model-ok.outputs.ok == 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/ww3watch-transformers
          key: me5b-q8-1ec9243

      # Push, don't pull: the freshness readout requires someone to LOOK at the
      # site. File (or append to) a single pipeline-failure issue so breakage
      # emails the maintainer. The pipeline self-fails on zero feeds, a total
      # LLM outage, and a >450MB DB — all route here.
      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create pipeline-failure --color B60205 --description "Ingestion pipeline failure" --force >/dev/null 2>&1 || true
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --label pipeline-failure --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Pipeline run failed again: $run_url"
          else
            gh issue create --title "Ingestion pipeline failing" --label pipeline-failure \
              --body "The ingestion pipeline failed — see $run_url. Close this issue once resolved; repeat failures append here instead of spamming."
          fi

      # GitHub disables scheduled workflows after 60 days of repo inactivity;
      # re-enabling via the API resets that timer without a dummy commit. Gated
      # to ~once a week (Monday, hour 00 UTC) so it's a handful of idempotent
      # calls, not one per 15-min run. (backup.yml's weekly commit also resets it.)
      - name: Keepalive — re-arm scheduled workflows
        if: ${{ github.event_name == 'schedule' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$(date -u +%u)" = "1" ] && [ "$(date -u +%H)" = "00" ]; then
            for wf in pipeline.yml backup.yml; do
              gh api -X PUT "repos/${{ github.repository }}/actions/workflows/$wf/enable" >/dev/null 2>&1 || true
            done
            echo "[keepalive] re-armed pipeline.yml + backup.yml"
          fi
