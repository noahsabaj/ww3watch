name: Sources backup

# The sources table is the canonical curated roster (curation = SQL UPDATEs, not
# commits), and Supabase free projects have NO automated backups — a paused/
# deleted project would lose every enable/disable/URL/affiliation edit since the
# seed. Dump the roster weekly to a committed JSON so it survives. Real commits
# also reset GitHub's 60-day scheduled-workflow inactivity timer.
on:
  schedule:
    - cron: '23 5 * * 1' # weekly, Monday 05:23 UTC
  workflow_dispatch: {}

concurrency:
  group: ww3watch-pipeline # share the pipeline group: never dump while a run is rewriting health
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node --import tsx scripts/backup-sources.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sources-backup.json
          if git diff --cached --quiet; then
            echo "no roster changes"
          else
            git commit -m "chore: weekly sources roster backup"
            git push
          fi
