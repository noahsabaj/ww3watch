name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check
        env:
          # svelte-check needs these at build/import time; dummies are fine for type-checking.
          PUBLIC_SUPABASE_URL: https://example.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: dummy

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Real publishable creds (public by design — they ship in the deployed
      # bundle); set as repo VARIABLES, not secrets.
      - run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ vars.PUBLIC_SUPABASE_ANON_KEY }}
      # Replicate deploy.yml's fallback copy so sirv --single serves the SPA.
      - run: cp build/404.html build/index.html
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test

  functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Type-check the npm-free shared modules (SSRF math, http, hash) — fast and
      # stable. The npm-dependent entrypoints are bundled + deployed by
      # deploy-functions.yml; their pure logic is exercised by the tests below.
      # --no-config: ignore the repo's SvelteKit tsconfig (its module/
      # moduleResolution conflict with Deno's defaults); --node-modules-dir=none:
      # use Deno's own npm cache, not the project's node_modules.
      - run: deno check --no-config --node-modules-dir=none supabase/functions/_shared/net.ts supabase/functions/_shared/http.ts supabase/functions/_shared/hash.ts supabase/functions/_shared/rss.ts
      - run: deno test --no-check --no-config --node-modules-dir=none supabase/functions/_shared/
