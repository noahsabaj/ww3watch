name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check
        env:
          # svelte-check needs these at build/import time; dummies are fine for type-checking.
          PUBLIC_SUPABASE_URL: https://example.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: dummy
