name: Deploy edge functions

# Edge functions previously deployed only via a manual MCP/CLI step, so the repo
# and production could silently drift. Deploy reader + translate + rss automatically
# whenever supabase/functions/** changes on main — merged code is the running code.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch: {}

concurrency:
  group: deploy-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # v2 is a composite action (v1 ran on the deprecated Node 20 runtime). The
      # github-token authenticates the "latest" release lookup v2 does via the API,
      # so it can't hit the unauthenticated rate limit and fail the deploy.
      - uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}
      # Gate at the SHELL level (the secrets context isn't available in `if:`).
      # Degrades gracefully to a warning if the token isn't set yet, so a
      # functions change never hard-fails before SUPABASE_ACCESS_TOKEN exists.
      - name: Deploy reader + translate + rss
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping function deploy. Add it to enable auto-deploy."
            exit 0
          fi
          supabase functions deploy reader translate rss --no-verify-jwt --project-ref qusjbpknlduuklnfciws
