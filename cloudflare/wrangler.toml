# Config for the feed-proxy Worker (cloudflare/feed-proxy.js).
# Deployed by .github/workflows/deploy-worker.yml. The Worker secret
# FEED_PROXY_SECRET is set out-of-band (`wrangler secret put FEED_PROXY_SECRET`),
# never committed here.
name = "feed-proxy"
main = "feed-proxy.js"
compatibility_date = "2025-06-01"
